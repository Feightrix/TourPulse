<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TourPulse — Team Goals Calculator</title>
  <link rel="icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">

  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ===== Banner Fix ===== */
    .banner{
      position:relative;
      overflow:hidden;
    }

    .bannerImg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.75;
      z-index:0;
    }

    .bannerBg,
    .bannerShade,
    .bannerInner{
      position:relative;
      z-index:1;
    }

    /* ===== Existing Layout ===== */
    .goalGrid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:12px;
    }

    .goalTile{
      border:1px solid rgba(15,23,42,.12);
      background:rgba(255,255,255,.78);
      border-radius:18px;
      padding:14px;
      box-shadow:0 16px 40px rgba(2,6,23,.08);
    }

    .goalLabel{
      font-size:12px;
      font-weight:1100;
      text-transform:uppercase;
      color:rgba(15,23,42,.62);
      margin-bottom:10px;
    }

    .goalInputs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .goalInput{
      width:100%;
      border:1px solid rgba(15,23,42,.12);
      border-radius:12px;
      padding:11px;
      font-size:18px;
      font-weight:1000;
    }

    .goalResult{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      padding-top:12px;
      border-top:1px solid rgba(15,23,42,.09);
    }

    .heroGoal{
      font-size:58px;
      font-weight:1200;
      margin-top:10px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<div class="wrap">
<section class="panel">

<!-- Topbar -->
<div class="topbar">
  <div class="brand">
    <div class="logoBox">
      <img src="images/MTK-logo.png" />
    </div>
    <div class="brandText">
      <p class="title">TourPulse</p>
      <p class="sub">Powered by F8</p>
    </div>
  </div>

  <div class="rightStack">
    <div class="userPill">
      <div id="userName">—</div>
      <div id="userEmp">—</div>
    </div>

    <button class="btnGhost" id="btnBack">← Back</button>
    <button class="btnGhost" id="btnSignOut">Sign Out</button>
  </div>
</div>

<!-- Banner -->
<div class="banner">
  <div class="bannerBg"></div>

  <img
    id="bannerImg"
    class="bannerImg"
    src="https://images.contentstack.io/v3/assets/bltba617d00249585dc/blt3feb49ba4da8f26d/5e4590eb5e52d50d64528109/SBR_property_CheckIn_003.jpg"
    alt="South Beach Resort"
  />

  <div class="bannerShade"></div>

  <div class="bannerInner">
    <div>
      <p class="k">South Beach Resort</p>
      <p class="site">Team Goals Calculator</p>
    </div>

    <button class="btn" id="btnReset">Reset Today</button>
  </div>
</div>

<!-- Main -->
<div class="grid">

<div class="card">
  <h1>Daily Arrival Goals</h1>
  <div id="goalGrid" class="goalGrid"></div>
</div>

<div class="card summaryCard">
  <div>Total Arrivals: <span id="sumArrivals">0</span></div>
  <div>Bookings Needed: <span id="sumGoal">0</span></div>
  <div id="heroGoal" class="heroGoal">0</div>
</div>

</div>
</section>
</div>

<script>
const SEGMENTS=["owners","vips","rci","renters","goos"];
const $=id=>document.getElementById(id);

function todayKey(){
  const d=new Date();
  return d.toISOString().split("T")[0];
}

function pKey(){return "tg_pct";}
function aKey(){return "tg_arr_"+todayKey();}

function read(k,def){
  try{return JSON.parse(localStorage.getItem(k))||def}catch{return def}
}

function write(k,v){localStorage.setItem(k,JSON.stringify(v));}

function render(){
  const g=$("goalGrid");
  const p=read(pKey(),{});
  const a=read(aKey(),{});
  g.innerHTML="";

  SEGMENTS.forEach(s=>{
    g.innerHTML+=`
    <div class="goalTile">
      <div class="goalLabel">${s.toUpperCase()}</div>

      <div class="goalInputs">
        <input class="goalInput" data-s="${s}" data-f="a" value="${a[s]||""}" placeholder="Arrivals">
        <input class="goalInput" data-s="${s}" data-f="p" value="${p[s]||""}" placeholder="%">
      </div>

      <div class="goalResult">
        <span>Goal</span>
        <span id="g_${s}">0</span>
      </div>
    </div>`;
  });

  calc();
}

function calc(){
  const p=read(pKey(),{});
  const a=read(aKey(),{});

  let totalA=0,totalG=0;

  SEGMENTS.forEach(s=>{
    const arr=Number(a[s]||0);
    const pct=Number(p[s]||0);

    const goal=Math.ceil(arr*(pct/100)||0);

    totalA+=arr;
    totalG+=goal;

    $("g_"+s).innerText=goal;
  });

  $("sumArrivals").innerText=totalA;
  $("sumGoal").innerText=totalG;
  $("heroGoal").innerText=totalG;
}

document.addEventListener("input",e=>{
  const el=e.target;
  if(!el.dataset.s)return;

  const s=el.dataset.s;
  const f=el.dataset.f;

  if(f==="a"){
    const a=read(aKey(),{});
    a[s]=Number(el.value||0);
    write(aKey(),a);
  }

  if(f==="p"){
    const p=read(pKey(),{});
    p[s]=Number(el.value||0);
    write(pKey(),p);
  }

  calc();
});

$("btnReset").onclick=()=>{
  localStorage.removeItem(aKey());
  render();
};

$("btnBack").onclick=()=>location.href="choose-calc.html";

render();
</script>

</body>
</html>
